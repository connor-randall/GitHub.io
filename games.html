<title>Connor Randall | Games</title>
<meta name="description" content="Connor Randall — little dumb games I've made.">
<meta name="author" content="Connor Randall">

<style>
:root {
  --bg:#080d08;
  --panel:#0f0f0f;
  --text:#b8ffb8;
  --accent:#33ff33;
  --accent-2:#ffff00;
  --border:#1f5c1f;
  --shadow:#000000;
}
* { box-sizing:border-box; }
html, body {
  margin:0; padding:0; min-height:100%;
  background:var(--bg); color:var(--text);
  font-family:"Courier New", monospace;
  overflow-x:hidden;
}
body {
  display:flex; align-items:flex-start; justify-content:center;
  padding:104px 16px 40px;
}

/* ===== TOP OSRS AREA ===== */
#osrs-header {
  position:fixed; top:0; left:0; width:100%;
  z-index:9999; background:#000;
  border-bottom:2px solid lime;
  box-shadow:0 2px 0 #003300;
}
#osrs-ticker {
  width:100%; height:22px; color:#00ff00;
  display:flex; align-items:center;
  overflow:hidden; border-bottom:1px solid #00aa00;
  padding:0 12px; font-size:11px;
}
#osrs-ticker-track { white-space:nowrap; display:inline-block; padding-left:20px; }
#osrs-ticker-track span { margin-right:40px; }
.osrs-99 {
  color:#ffd700;
  text-shadow:0 0 6px #ffaa00, 0 0 12px #ff8800;
  animation:gold-shimmer 2s ease-in-out infinite;
}
@keyframes gold-shimmer {
  0%,100% { color:#ffd700; text-shadow:0 0 6px #ffaa00, 0 0 12px #ff8800; }
  50%      { color:#fff0a0; text-shadow:0 0 10px #ffd700, 0 0 20px #ffaa00; }
}
@keyframes ticker-scroll {
  0%   { transform:translateX(0); }
  100% { transform:translateX(-50%); }
}
.osrs-label-scroll {
  height:22px; display:flex; align-items:center;
  color:#ffff00; background:#111;
  text-transform:uppercase; letter-spacing:2px;
  font-size:11px; overflow:hidden;
}
#osrs-label-track { white-space:nowrap; display:inline-block; }
#osrs-label-track span { margin-right:60px; }

/* ===== NAV DIVIDER ===== */
.osrs-nav-divider {
  height:4px;
  background:#152015;
  border-top:1px solid #33ff33;
}

/* ===== NAV BAR ===== */
#site-nav {
  background:#0c0c0c;
  border-bottom:2px solid var(--border);
  display:flex; justify-content:center; gap:0;
  padding:0; flex-wrap:wrap;
}
#site-nav a {
  color:#ffff00; text-decoration:none;
  font-family:"Courier New", monospace;
  font-size:14px; text-transform:uppercase; letter-spacing:2px;
  padding:10px 24px; border-right:1px solid var(--border);
  transition:background 0.1s, color 0.1s;
}
#site-nav a:first-child { border-left:1px solid var(--border); }
#site-nav a:hover { background:var(--accent); color:#000; }
#site-nav a.active { background:#152015; color:var(--accent); }

/* ===== LAYOUT ===== */
.wrap { width:100%; max-width:900px; }
.window {
  background:var(--panel);
  border:3px solid var(--border);
  box-shadow:8px 8px 0 var(--shadow);
  padding:18px 14px 28px;
}
.title-bar {
  display:flex; justify-content:space-between; align-items:center;
  background:#152015;
  border:2px solid var(--border); padding:6px 10px; margin-bottom:22px;
  font-size:14px; text-transform:uppercase;
}
.buttons { display:flex; gap:6px; }
.btn { width:16px; height:16px; border:2px solid #fff; background:#000; }

.page-heading {
  text-align:center; color:var(--accent);
  font-size:clamp(14px, 2.5vw, 22px);
  letter-spacing:4px; text-transform:uppercase;
  text-shadow:0 0 10px rgba(51,255,51,0.5);
  margin-bottom:6px;
}
.page-sub {
  text-align:center; color:#888;
  font-size:11px; letter-spacing:2px; margin-bottom:24px;
}
.divider {
  margin:20px auto; width:min(720px,100%);
  color:var(--border); overflow:hidden; white-space:nowrap; text-align:center;
}

/* ===== ARCADE MARQUEE ===== */
.arcade-marquee {
  text-align:center;
  margin-bottom:24px;
  border:2px solid var(--accent-2);
  background:#000;
  padding:8px;
  color:var(--accent-2);
  font-size:12px;
  letter-spacing:2px;
  animation:pulse-border 2s ease-in-out infinite;
}
@keyframes pulse-border {
  0%,100% { border-color:var(--accent-2); box-shadow:0 0 4px var(--accent-2); }
  50%      { border-color:#ffff88; box-shadow:0 0 12px var(--accent-2); }
}

/* ===== GAME GRID ===== */
.games-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(240px, 1fr));
  gap:16px;
  max-width:860px;
  margin:0 auto;
}

.game-card {
  background:rgba(0,0,0,0.5);
  border:2px solid var(--border);
  padding:16px;
  text-align:center;
  transition:border-color 0.2s, transform 0.15s;
  position:relative;
  overflow:hidden;
}
.game-card::after {
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, rgba(51,255,51,0.04) 0%, transparent 60%);
  pointer-events:none;
}
.game-card:hover {
  border-color:var(--accent-2);
  transform:translate(-2px,-2px);
  box-shadow:4px 4px 0 var(--accent-2);
}
.game-card.coming-soon {
  opacity:0.55;
  cursor:not-allowed;
}
.game-card.coming-soon:hover {
  transform:none;
  box-shadow:none;
  border-color:var(--border);
}

.game-icon {
  font-size:11px;
  line-height:1.3;
  margin-bottom:12px;
  display:inline-block;
  color:var(--accent-2);
  text-shadow:0 0 6px rgba(255,102,204,0.5);
  white-space:pre;
  font-family:"Courier New",monospace;
}
.game-name {
  color:#ffff00;
  font-size:14px;
  font-weight:bold;
  letter-spacing:1px;
  text-transform:uppercase;
  margin-bottom:8px;
}
.game-desc {
  color:#aaa;
  font-size:12px;
  line-height:1.6;
  margin-bottom:14px;
}
.game-badge {
  display:inline-block;
  font-size:10px;
  letter-spacing:2px;
  padding:3px 8px;
  border:1px solid;
  text-transform:uppercase;
  margin-bottom:14px;
}
.game-badge.playable { color:#00ff88; border-color:#00ff88; }
.game-badge.soon     { color:#888;    border-color:#555;    }
.game-badge.wip      { color:#ffff00; border-color:#ffaa00; }

.play-btn {
  display:inline-block;
  background:#000;
  border:2px solid var(--accent);
  color:var(--accent);
  font-family:"Courier New", monospace;
  font-size:12px;
  letter-spacing:2px;
  text-transform:uppercase;
  padding:6px 18px;
  text-decoration:none;
  cursor:pointer;
  transition:background 0.15s, color 0.15s;
}
.play-btn:hover { background:var(--accent); color:#000; }

.coming-soon-label {
  color:#555;
  font-size:11px;
  letter-spacing:2px;
  margin-top:8px;
}

.placeholder-note {
  text-align:center; color:#555;
  font-size:11px; margin-top:16px; letter-spacing:2px;
}

/* ===== INSERT COIN ===== */
.insert-coin {
  text-align:center;
  margin-top:30px;
  color:#ffd700;
  font-size:14px;
  letter-spacing:4px;
  text-transform:uppercase;
  animation:blink 1.2s steps(1) infinite;
}
@keyframes blink { 50% { opacity:0; } }

@media (max-width:640px) {
  body { padding-top:108px; }
  .games-grid { grid-template-columns:1fr; }
  #site-nav a { font-size:11px; padding:5px 10px; }
}

/* ===== THEME: DARK ===== */
[data-theme="dark"] {
  --bg:#0f1117; --panel:#1c1f2e; --text:#c9d1d9;
  --accent:#58a6ff; --accent-2:#ffa657; --border:#30363d; --shadow:#010409;
}
[data-theme="dark"] #osrs-header     { background:#161b22; border-bottom-color:#58a6ff; box-shadow:0 2px 0 #0d1117; }
[data-theme="dark"] #osrs-ticker     { color:#58a6ff; border-bottom-color:#21262d; }
[data-theme="dark"] .osrs-label-scroll { color:#ffa657; background:#0d1117; }
[data-theme="dark"] .osrs-nav-divider  { background:#0d1117; border-top-color:#58a6ff; }
[data-theme="dark"] #site-nav        { background:#161b22; }
[data-theme="dark"] #site-nav a      { color:#ffa657; border-right-color:#30363d; }
[data-theme="dark"] #site-nav a:first-child { border-left-color:#30363d; }
[data-theme="dark"] #site-nav a:hover{ background:#58a6ff; color:#0d1117; }
[data-theme="dark"] #site-nav a.active { background:#1c2128; color:#58a6ff; }
[data-theme="dark"] .title-bar       { background:#1c2128; }
[data-theme="dark"] .osrs-99         { color:#ffa657; text-shadow:0 0 6px #c0602a; }

/* ===== THEME: LIGHT ===== */
[data-theme="light"] {
  --bg:#f0ede8; --panel:#ffffff; --text:#24292f;
  --accent:#1a7f37; --accent-2:#953800; --border:#d0d7de; --shadow:#afb8c1;
}
[data-theme="light"] #osrs-header    { background:#ffffff; border-bottom-color:#1a7f37; box-shadow:0 2px 0 #d0d7de; }
[data-theme="light"] #osrs-ticker    { color:#1a7f37; border-bottom-color:#d0d7de; background:#f6f8fa; }
[data-theme="light"] .osrs-label-scroll { color:#953800; background:#f6f8fa; }
[data-theme="light"] .osrs-nav-divider  { background:#f6f8fa; border-top-color:#1a7f37; }
[data-theme="light"] #site-nav       { background:#f6f8fa; }
[data-theme="light"] #site-nav a     { color:#953800; border-right-color:#d0d7de; }
[data-theme="light"] #site-nav a:first-child { border-left-color:#d0d7de; }
[data-theme="light"] #site-nav a:hover { background:#1a7f37; color:#ffffff; }
[data-theme="light"] #site-nav a.active { background:#e6f4ea; color:#1a7f37; }
[data-theme="light"] .title-bar      { background:#e6f4ea; }
[data-theme="light"] .osrs-99        { color:#953800; text-shadow:none; }
[data-theme="light"] .btn            { background:#f6f8fa; border-color:#d0d7de; }

/* ===== THEME PICKER ===== */
#theme-picker {
  position:fixed; bottom:20px; right:20px;
  z-index:99998; font-family:"Courier New",monospace;
  font-size:11px; text-align:right;
}
#theme-toggle {
  background:var(--panel); border:1px solid var(--border);
  color:var(--accent-2); font-family:"Courier New",monospace;
  font-size:11px; letter-spacing:1px; padding:6px 12px;
  cursor:pointer; text-transform:uppercase;
  transition:border-color 0.1s, color 0.1s;
}
#theme-toggle:hover { border-color:var(--accent); color:var(--accent); }
#theme-options {
  background:var(--panel); border:1px solid var(--border);
  margin-top:4px; padding:4px;
  display:none; flex-direction:column; gap:2px;
}
.theme-opt {
  background:transparent; border:none;
  color:var(--text); font-family:"Courier New",monospace;
  font-size:11px; letter-spacing:1px; padding:5px 10px;
  cursor:pointer; text-align:left; text-transform:uppercase;
  white-space:nowrap; transition:color 0.1s;
}
.theme-opt:hover { color:var(--accent); }
.theme-opt.active { color:var(--accent); }

/* ===== FONT OVERRIDES (non-retro themes) ===== */
[data-theme="dark"] body,
[data-theme="light"] body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
}
[data-theme="dark"] #site-nav a,
[data-theme="light"] #site-nav a {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  letter-spacing: 0.5px;
  text-transform: none;
}
[data-theme="dark"] #theme-toggle,
[data-theme="light"] #theme-toggle,
[data-theme="dark"] .theme-opt,
[data-theme="light"] .theme-opt {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  letter-spacing: 0;
  text-transform: none;
}
[data-theme="dark"] .title-bar,
[data-theme="light"] .title-bar {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  letter-spacing: 0.5px;
  text-transform: none;
}
[data-theme="dark"] .page-heading,
[data-theme="light"] .page-heading {
  letter-spacing: 1px;
}
[data-theme="dark"] pre,
[data-theme="dark"] code,
[data-theme="light"] pre,
[data-theme="light"] code {
  font-family: "Courier New", monospace;
}
</style>
</head>
<body>

<div id="osrs-header">
  <div id="osrs-ticker">
    <div id="osrs-ticker-track">loading stats...</div>
  </div>
  <div class="osrs-label-scroll">
    <div id="osrs-label-track"></div>
  </div>
  <div class="osrs-nav-divider"></div>
  <nav id="site-nav">
    <a href="index.html">[ home ]</a>
    <a href="experience.html">[ experience ]</a>
    <a href="projects.html">[ projects ]</a>
    <a href="games.html" class="active">[ games ]</a>
  </nav>
  <div class="osrs-nav-divider"></div>
</div>

<div class="wrap">
  <div class="window">
    <div class="title-bar">
      <span>games.exe</span>
      <div class="buttons">
        <span class="btn"></span><span class="btn"></span><span class="btn"></span>
      </div>
    </div>

    <div class="page-heading">&gt;&gt; the arcade &lt;&lt;</div>
    <div class="page-sub">// little dumb things i made //</div>

    <div class="divider">========================================================================</div>

    <div class="games-grid">

      <div style="grid-column:1/-1;text-align:center;color:#555;font-size:12px;letter-spacing:2px;padding:40px 0;">
        // no games yet — check back soon //
      </div>

    </div>

  </div>
</div>

<div id="theme-picker">
  <button id="theme-toggle" onclick="toggleThemePicker()">[ theme ]</button>
  <div id="theme-options">
    <button class="theme-opt" onclick="setTheme('retro')">[ retro ]</button>
    <button class="theme-opt" onclick="setTheme('dark')">[ dark ]</button>
    <button class="theme-opt" onclick="setTheme('light')">[ light ]</button>
  </div>
</div>
<script>
function toggleThemePicker(){
  var el=document.getElementById('theme-options');
  el.style.display=el.style.display==='flex'?'none':'flex';
}
function setTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  localStorage.setItem('site-theme',t);
  document.querySelectorAll('.theme-opt').forEach(function(b){
    b.classList.toggle('active',b.textContent.trim()==='[ '+t+' ]');
  });
  document.getElementById('theme-options').style.display='none';
}
(function(){
  var t=localStorage.getItem('site-theme')||'retro';
  document.querySelectorAll('.theme-opt').forEach(function(b){
    b.classList.toggle('active',b.textContent.trim()==='[ '+t+' ]');
  });
})();
document.addEventListener('click',function(e){
  var picker=document.getElementById('theme-picker');
  if(picker && !picker.contains(e.target)){
    document.getElementById('theme-options').style.display='none';
  }
});
</script>
<script src="ticker.js?v=9"></script>
</body>
</html>
